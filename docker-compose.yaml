# docker-compose.yml
services:
  web:
    build: .
    container_name: unashamed_web
    ports:
      - "4090:4090"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: unashamed_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: